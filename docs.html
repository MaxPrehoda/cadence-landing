<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadence Docs</title>

    <meta name="description" content="Documentation for Cadence: the voice-first OS layer for macOS. Install guide, hotkeys, voice commands, agents, intent engine, integrations, settings reference.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://cadencevoice.ai/docs.html">
    <meta name="theme-color" content="#0c0a09">

    <meta property="og:type" content="article">
    <meta property="og:title" content="Cadence Docs">
    <meta property="og:description" content="Documentation for Cadence: voice control for AI agents on macOS.">
    <meta property="og:url" content="https://cadencevoice.ai/docs.html">
    <meta property="og:image" content="https://cadencevoice.ai/icon.png">

    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">

    <style>
        :root {
            --bg-base: #0c0a09;
            --bg-surface: #1c1917;
            --bg-elevated: #292524;
            --bg-code: #14110f;
            --accent-primary: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.25);
            --accent-border: rgba(45, 212, 191, 0.2);
            --text-primary: #fafaf9;
            --text-secondary: #d6d3d1;
            --text-muted: #a8a29e;
            --text-dim: #78716c;
            --text-ghost: #57534e;
            --border-subtle: rgba(168, 162, 158, 0.08);
            --border-strong: rgba(168, 162, 158, 0.18);
            --font-sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
            --sidebar-w: 280px;
            --max-content: 760px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            line-height: 1.6;
        }

        a { color: var(--accent-primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ---------------- header ---------------- */

        header.site {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(12, 10, 9, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .site-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .brand svg { flex-shrink: 0; }

        .brand-name {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .brand-divider {
            color: var(--text-ghost);
            font-size: 14px;
        }

        .brand-section {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        nav.primary {
            display: flex;
            gap: 24px;
            align-items: center;
            font-size: 13px;
        }

        nav.primary a {
            color: var(--text-muted);
            transition: color 0.15s;
        }

        nav.primary a:hover {
            color: var(--accent-primary);
            text-decoration: none;
        }

        /* ---------------- layout ---------------- */

        .layout {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: var(--sidebar-w) 1fr;
            gap: 0;
            min-height: calc(100vh - 65px);
        }

        /* ---------------- sidebar ---------------- */

        aside.sidebar {
            border-right: 1px solid var(--border-subtle);
            padding: 32px 0 64px 0;
            position: sticky;
            top: 65px;
            align-self: start;
            max-height: calc(100vh - 65px);
            overflow-y: auto;
        }

        .search-wrap {
            padding: 0 24px 20px 24px;
        }

        .search {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 13px;
            padding: 9px 12px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s;
        }

        .search::placeholder { color: var(--text-dim); }

        .search:focus {
            border-color: var(--accent-border);
        }

        .toc-section {
            margin-bottom: 24px;
            padding: 0 24px;
        }

        .toc-heading {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .toc-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .toc-link {
            display: block;
            padding: 6px 10px;
            margin-left: -10px;
            border-radius: 5px;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.12s;
        }

        .toc-link:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            text-decoration: none;
        }

        .toc-link.active {
            background: var(--bg-surface);
            color: var(--accent-primary);
            border-left: 2px solid var(--accent-primary);
            padding-left: 8px;
        }

        .toc-link.hidden { display: none; }

        .toc-empty {
            font-size: 13px;
            color: var(--text-dim);
            font-style: italic;
            padding: 0 24px;
        }

        /* ---------------- content ---------------- */

        main.content {
            padding: 48px 64px 96px 64px;
            min-width: 0;
        }

        .content-inner {
            max-width: var(--max-content);
        }

        article {
            font-size: 15px;
            color: var(--text-secondary);
        }

        article h1 {
            font-size: 40px;
            line-height: 1.1;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        article h2 {
            font-size: 24px;
            line-height: 1.25;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            margin-top: 48px;
            margin-bottom: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        article h2:first-of-type {
            border-top: none;
            padding-top: 0;
            margin-top: 32px;
        }

        article h3 {
            font-size: 18px;
            line-height: 1.3;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 32px;
            margin-bottom: 12px;
        }

        article h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 24px;
            margin-bottom: 8px;
        }

        article p {
            margin-bottom: 16px;
        }

        article ul, article ol {
            margin: 0 0 16px 0;
            padding-left: 24px;
        }

        article li { margin-bottom: 6px; }

        article li > ul, article li > ol { margin-top: 6px; }

        article strong { color: var(--text-primary); font-weight: 600; }

        article em { color: var(--text-primary); }

        article hr {
            border: none;
            border-top: 1px solid var(--border-subtle);
            margin: 40px 0;
        }

        article blockquote {
            border-left: 2px solid var(--accent-primary);
            padding: 4px 0 4px 16px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-style: italic;
            background: rgba(45, 212, 191, 0.04);
        }

        article blockquote p { margin: 0; }

        /* code */
        article code {
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--bg-elevated);
            color: var(--accent-primary);
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
        }

        article pre {
            background: var(--bg-code);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 16px 20px;
            overflow-x: auto;
            margin: 0 0 16px 0;
            font-size: 13px;
            line-height: 1.6;
        }

        article pre code {
            background: transparent;
            border: none;
            padding: 0;
            color: var(--text-secondary);
            font-size: inherit;
        }

        /* tables */
        article table {
            border-collapse: collapse;
            width: 100%;
            margin: 0 0 24px 0;
            font-size: 14px;
            display: block;
            overflow-x: auto;
        }

        article thead {
            background: var(--bg-surface);
        }

        article th, article td {
            text-align: left;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-subtle);
        }

        article th {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 13px;
            border-bottom: 1px solid var(--border-strong);
        }

        article td {
            color: var(--text-secondary);
        }

        article td code {
            font-size: 12px;
            white-space: nowrap;
        }

        /* ---------------- footer nav ---------------- */

        .doc-footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            gap: 12px;
            justify-content: space-between;
            font-size: 14px;
        }

        .doc-footer a {
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-secondary);
            transition: all 0.15s;
            min-width: 180px;
        }

        .doc-footer a:hover {
            border-color: var(--accent-border);
            color: var(--accent-primary);
            text-decoration: none;
        }

        .doc-footer .lbl {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .doc-footer .next { text-align: right; align-items: flex-end; }

        .doc-footer .empty {
            visibility: hidden;
        }

        /* ---------------- meta strip ---------------- */

        .meta-strip {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .meta-strip .accent { color: var(--accent-primary); }

        /* ---------------- error / loading ---------------- */

        .doc-status {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            padding: 32px 0;
        }

        .doc-status.error { color: #f87171; }

        /* ---------------- mobile ---------------- */

        .mobile-toggle {
            display: none;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 7px 12px;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        @media (max-width: 920px) {
            .layout { grid-template-columns: 1fr; }
            aside.sidebar {
                position: fixed;
                top: 65px;
                left: 0;
                width: 320px;
                max-width: 90vw;
                background: var(--bg-base);
                border-right: 1px solid var(--border-subtle);
                transform: translateX(-100%);
                transition: transform 0.2s;
                z-index: 40;
                height: calc(100vh - 65px);
                max-height: none;
            }
            aside.sidebar.open { transform: translateX(0); }
            main.content { padding: 32px 24px 96px 24px; }
            .mobile-toggle { display: inline-flex; }
            article h1 { font-size: 32px; }
            .doc-footer { flex-direction: column; }
            .doc-footer .next { text-align: left; align-items: flex-start; }
        }

        /* scrollbar styling for sidebar */
        aside.sidebar::-webkit-scrollbar { width: 8px; }
        aside.sidebar::-webkit-scrollbar-track { background: transparent; }
        aside.sidebar::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 4px;
        }
        aside.sidebar::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    </style>
</head>
<body>

<header class="site">
    <div class="site-inner">
        <a href="/" class="brand">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 1024 1024" role="img" aria-label="Cadence logo">
                <defs>
                    <linearGradient id="wave-docs" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#2dd4bf"/>
                        <stop offset="100%" stop-color="#5eead4"/>
                    </linearGradient>
                </defs>
                <rect x="218" y="362" width="42" height="300" rx="21" fill="url(#wave-docs)"/>
                <rect x="298" y="282" width="42" height="460" rx="21" fill="url(#wave-docs)"/>
                <rect x="378" y="202" width="42" height="620" rx="21" fill="url(#wave-docs)"/>
                <rect x="458" y="152" width="42" height="720" rx="21" fill="url(#wave-docs)"/>
                <rect x="538" y="122" width="42" height="780" rx="21" fill="url(#wave-docs)"/>
                <rect x="618" y="172" width="42" height="680" rx="21" fill="url(#wave-docs)"/>
                <rect x="698" y="252" width="42" height="520" rx="21" fill="url(#wave-docs)"/>
                <rect x="778" y="342" width="42" height="340" rx="21" fill="url(#wave-docs)"/>
            </svg>
            <span class="brand-name">Cadence</span>
            <span class="brand-divider">/</span>
            <span class="brand-section">Docs</span>
        </a>
        <div style="display: flex; gap: 16px; align-items: center;">
            <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle navigation">Menu</button>
            <nav class="primary" aria-label="Primary">
                <a href="/#tech">Tech</a>
                <a href="/blog/">Writing</a>
                <a href="/#download">Download</a>
                <a href="https://github.com/MaxPrehoda/cadence" target="_blank" rel="noopener">GitHub</a>
            </nav>
        </div>
    </div>
</header>

<div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Documentation navigation">
        <div class="search-wrap">
            <input type="search" class="search" id="search"
                   placeholder="Search docs…" aria-label="Search documentation"
                   autocomplete="off" spellcheck="false">
        </div>
        <div id="toc"></div>
    </aside>

    <main class="content">
        <div class="content-inner">
            <div class="meta-strip"><span class="accent">●</span> Cadence v<span id="ver">0.4.0</span> · End-user documentation</div>
            <article id="article">
                <div class="doc-status">Loading…</div>
            </article>
            <nav class="doc-footer" id="doc-footer" aria-label="Document"></nav>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<script>
(() => {
    const TOC_EL    = document.getElementById('toc');
    const ARTICLE   = document.getElementById('article');
    const SEARCH    = document.getElementById('search');
    const FOOTER    = document.getElementById('doc-footer');
    const SIDEBAR   = document.getElementById('sidebar');
    const MOB_TOG   = document.getElementById('mobile-toggle');
    const VER       = document.getElementById('ver');

    let manifest = null;
    let flat     = [];   // flattened ordered list of docs for prev/next

    // marked + highlight setup
    marked.setOptions({
        gfm: true,
        breaks: false,
        smartypants: false,
        headerIds: true,
        mangle: false,
        highlight(code, lang) {
            try {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            } catch { return code; }
        }
    });

    // Rewrite doc-relative links so they go through hash routing.
    const renderer = new marked.Renderer();
    const baseLink = renderer.link.bind(renderer);
    renderer.link = (href, title, text) => {
        if (typeof href === 'string' && href.startsWith('#/')) {
            return `<a href="${href}">${text}</a>`;
        }
        const html = baseLink(href, title, text);
        // open external links in new tab
        if (typeof href === 'string' && /^https?:/i.test(href)) {
            return html.replace('<a ', '<a target="_blank" rel="noopener" ');
        }
        return html;
    };
    marked.use({ renderer });

    function parseRoute() {
        const h = window.location.hash || '';
        const m = h.match(/^#\/([\w\-]+)/);
        return m ? m[1] : (manifest ? manifest.sections[0].items[0].id : 'introduction');
    }

    function buildToc() {
        TOC_EL.innerHTML = '';
        flat = [];
        manifest.sections.forEach(section => {
            const wrap = document.createElement('div');
            wrap.className = 'toc-section';
            const h = document.createElement('div');
            h.className = 'toc-heading';
            h.textContent = section.title;
            wrap.appendChild(h);
            const ul = document.createElement('ul');
            ul.className = 'toc-list';
            section.items.forEach(item => {
                flat.push(item);
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.className = 'toc-link';
                a.href = `#/${item.id}`;
                a.textContent = item.title;
                a.dataset.id = item.id;
                li.appendChild(a);
                ul.appendChild(li);
            });
            wrap.appendChild(ul);
            TOC_EL.appendChild(wrap);
        });
    }

    function updateActive(id) {
        document.querySelectorAll('.toc-link').forEach(a => {
            a.classList.toggle('active', a.dataset.id === id);
        });
    }

    function updateFooter(id) {
        const idx = flat.findIndex(d => d.id === id);
        FOOTER.innerHTML = '';
        const prev = idx > 0 ? flat[idx - 1] : null;
        const next = idx >= 0 && idx < flat.length - 1 ? flat[idx + 1] : null;

        const prevA = document.createElement('a');
        prevA.className = 'prev';
        if (prev) {
            prevA.href = `#/${prev.id}`;
            prevA.innerHTML = `<span class="lbl">← Previous</span><span>${prev.title}</span>`;
        } else {
            prevA.className = 'prev empty';
            prevA.href = '#';
        }
        FOOTER.appendChild(prevA);

        const nextA = document.createElement('a');
        nextA.className = 'next';
        if (next) {
            nextA.href = `#/${next.id}`;
            nextA.innerHTML = `<span class="lbl">Next →</span><span>${next.title}</span>`;
        } else {
            nextA.className = 'next empty';
            nextA.href = '#';
        }
        FOOTER.appendChild(nextA);
    }

    async function loadDoc(id) {
        ARTICLE.innerHTML = '<div class="doc-status">Loading…</div>';
        try {
            const r = await fetch(`docs/${id}.md`, { cache: 'no-cache' });
            if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
            const md = await r.text();
            ARTICLE.innerHTML = marked.parse(md);
            ARTICLE.querySelectorAll('pre code').forEach(el => {
                try { hljs.highlightElement(el); } catch {}
            });
            updateActive(id);
            updateFooter(id);
            const item = flat.find(d => d.id === id);
            document.title = item ? `${item.title}. Cadence Docs` : 'Cadence Docs';
            // close mobile sidebar after navigation
            SIDEBAR.classList.remove('open');
            // scroll to top of article
            window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
        } catch (err) {
            ARTICLE.innerHTML = `<div class="doc-status error">Failed to load doc: ${err.message}</div>
                <p>If you reached this by link, try the <a href="#/introduction">introduction</a>.</p>`;
        }
    }

    function onHashChange() {
        const id = parseRoute();
        loadDoc(id);
    }

    function applySearch() {
        const q = SEARCH.value.trim().toLowerCase();
        document.querySelectorAll('.toc-link').forEach(a => {
            if (!q) { a.classList.remove('hidden'); return; }
            const hit = a.textContent.toLowerCase().includes(q) ||
                        a.dataset.id.toLowerCase().includes(q);
            a.classList.toggle('hidden', !hit);
        });
        // hide section heading if all its links are hidden
        document.querySelectorAll('.toc-section').forEach(sec => {
            const visible = sec.querySelectorAll('.toc-link:not(.hidden)').length;
            sec.style.display = visible ? '' : 'none';
        });
    }

    SEARCH.addEventListener('input', applySearch);

    // '/' to focus search
    document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== SEARCH &&
            !e.metaKey && !e.ctrlKey && !e.altKey) {
            e.preventDefault();
            SEARCH.focus();
        }
        if (e.key === 'Escape' && document.activeElement === SEARCH) {
            SEARCH.value = '';
            applySearch();
            SEARCH.blur();
        }
    });

    MOB_TOG.addEventListener('click', () => SIDEBAR.classList.toggle('open'));

    window.addEventListener('hashchange', onHashChange);

    // Boot
    fetch('docs/index.json', { cache: 'no-cache' })
        .then(r => r.ok ? r.json() : Promise.reject(new Error(r.statusText)))
        .then(json => {
            manifest = json;
            if (json.version) VER.textContent = json.version;
            buildToc();
            onHashChange();
        })
        .catch(err => {
            ARTICLE.innerHTML = `<div class="doc-status error">Failed to load docs index: ${err.message}</div>`;
        });
})();
</script>

</body>
</html>
